<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Empty Field Validation</title>
</head>
<body>

    <form onsubmit="return validateForm()">
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Enter name">

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter email">

        <button type="submit">Submit</button>
    </form>

    <script>
        function validateForm() {
            // Retrieve the values from the input fields
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;

            // 2. If the user tries to submit without entering data, show an alert
            // .trim() is used to ensure the user hasn't just entered spaces
            if (name.trim() === "" || email.trim() === "") {
                alert("All fields must be filled!");
                return false; // Prevents the form from submitting
            }

            return true; // Allows submission if validation passes
        }
    </script>

</body>
</html>
