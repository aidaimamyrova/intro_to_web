<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Number Validation</title>
</head>
<body>

    <form onsubmit="return validateNumber()">
        <label for="age">Enter Age:</label>
        <input type="text" id="age" placeholder="Enter age">
        <button type="submit">Submit</button>
    </form>

    <script>
        function validateNumber() {
            // Retrieve the value from the age input field
            let age = document.getElementById("age").value;

            // 2. Check if the value is not a number OR if the field is empty
            // .trim() removes any leading or trailing spaces
            if (isNaN(age) || age.trim() === "") {
                // 3. Show an alert if the input is not a valid number
                alert("Please enter a valid number!");
                return false; // Prevents the form from submitting
            }

            return true; // Allows submission if validation passes
        }
    </script>

</body>
</html>
