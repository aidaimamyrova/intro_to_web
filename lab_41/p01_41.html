<!DOCTYPE html>
<html lang="en">
<head>
    <title>Button Click Lab</title>
</head>
<body>
    <p id="msg">This is the initial message.</p>

    <button onclick="updateText()">Click Me</button>

    <script>
        function updateText() {
            // 3. Update paragraph text to "Button Clicked!"
            document.getElementById("msg").innerText = "Button Clicked!";
        }
    </script>
</body>
</html>
