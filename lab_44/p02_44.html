<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task List with Delete</title>
</head>
<body>

    <input type="text" id="taskInput" placeholder="Enter a new task">
    <button id="addTaskBtn">Add Task</button>

    <ul id="taskList"></ul>

    <script>
        const taskInput = document.getElementById("taskInput");
        const addTaskBtn = document.getElementById("addTaskBtn");
        const taskList = document.getElementById("taskList");

        addTaskBtn.onclick = function() {
            let taskValue = taskInput.value;

            if (taskValue.trim() !== "") {
                // 1. Create the list item
                let li = document.createElement("li");
                li.innerText = taskValue + " "; // Add space between text and button

                // 2. Create the Delete button (X)
                let deleteBtn = document.createElement("button");
                deleteBtn.innerText = "X";

                // 3. Add the delete functionality
                deleteBtn.onclick = function() {
                    // This refers to the specific li containing this button
                    li.remove();
                };

                // 4. Append button to li, then li to the list
                li.appendChild(deleteBtn);
                taskList.appendChild(li);

                // Clear input
                taskInput.value = "";
            }
        };
    </script>

</body>
</html>
