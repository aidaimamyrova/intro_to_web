<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* 1. CSS class that changes text color, font weight, and adds a border */
        .highlight {
            color: white;
            background-color: blue;
            font-weight: bold;
            padding: 10px;
            border-radius: 5px;
            border: 2px solid darkblue; /* Added border as per instructions */
        }
    </style>
    <title>Toggle Class</title>
</head>
<body>

    <p id="text">Click the button to highlight me!</p>

    <button id="toggleClass">Toggle Highlight</button>

    <script>
        let button = document.getElementById("toggleClass");
        let text = document.getElementById("text");

        button.onclick = function() {
            // Using classList toggle to add/remove the 'highlight' class
            text.classList.toggle("highlight");
        };
    </script>
</body>
</html>
