<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* 1. Create a div element styled as a box */
        #box {
            width: 50px;
            height: 50px;
            background-color: red;
            position: absolute; /* Required to use the 'left' property */
            top: 100px;
        }
    </style>
    <title>Moving Box</title>
</head>
<body>

    <div id="box"></div>
    <button id="moveButton">Move Right</button>

    <script>
        // Select elements by their IDs
        let box = document.getElementById("box");
        let button = document.getElementById("moveButton");
        let position = 0; // Starting horizontal position

        // 2. When the button is clicked, move the box using setInterval
        button.onclick = function() {
            // setInterval runs the code every 50 milliseconds
            let interval = setInterval(() => {

                // Move the box until it reaches 300px
                if (position < 300) {
                    position += 5; // Increase position by 5 pixels
                    box.style.left = position + "px"; // Update CSS style
                } else {
                    // Stop the animation when the limit is reached
                    clearInterval(interval);
                }

            }, 50);
        };
    </script>

</body>
</html>
