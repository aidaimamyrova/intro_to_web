<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Layout</title>
    <style>
        .container {
            display: grid;
            /* Column 1 is 200px (Sidebar), Column 2 takes remaining space */
            grid-template-columns: 200px 1fr;
            /* Header is 80px, Content is flexible, Footer is 60px */
            grid-template-rows: 80px 1fr 60px;
            gap: 10px;
        }

        .header, .footer {
            /* This tells the element to stretch across both grid columns */
            grid-column: span 2;
            background-color: lightblue;
            text-align: center;
            padding: 20px;
        }

        .sidebar {
            background-color: lightgray;
            padding: 20px;
        }

        .content {
            background-color: lightgreen;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">Header</div>
        <div class="sidebar">Sidebar</div>
        <div class="content">Main Content</div>
        <div class="footer">Footer</div>
    </div>

</body>
</html>
