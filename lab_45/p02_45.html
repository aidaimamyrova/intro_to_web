<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post Cards Lab</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        #postsContainer {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        /* Styling the card */
        .post-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-top: 5px solid #ff4757;
        }
        .post-card h3 { color: #2f3542; margin-top: 0; text-transform: capitalize; }
        .post-card p { color: #57606f; line-height: 1.5; }
    </style>
</head>
<body>

    <h1>Latest News</h1>
    <div id="postsContainer">
        </div>

    <script>
        const container = document.getElementById("postsContainer");

        // 1. Fetch the data
        fetch('https://jsonplaceholder.typicode.com/posts')
            .then(response => response.json())
            .then(data => {
                // 2. Limit to the first 5 posts using slice
                const firstFive = data.slice(0, 5);

                // 3. Loop and create cards
                firstFive.forEach(post => {
                    const card = document.createElement("div");
                    card.className = "post-card";

                    card.innerHTML = `
                        <h3>${post.title}</h3>
                        <p>${post.body}</p>
                    `;

                    container.appendChild(card);
                });
            })
            .catch(error => console.error('Error:', error));
    </script>

</body>
</html>
