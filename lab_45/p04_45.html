<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Users Lab</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        #searchInput {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 5px;
        }
        ul { list-style: none; padding: 0; }
        li {
            padding: 10px;
            border-bottom: 1px solid #eee;
            background: #fff;
        }
        li:hover { background: #f9f9f9; }
    </style>
</head>
<body>

    <h2>User Search</h2>
    <input type="text" id="searchInput" placeholder="Search by name...">

    <ul id="userList">
        <li>Loading users...</li>
    </ul>

    <script>
        const searchInput = document.getElementById("searchInput");
        const userList = document.getElementById("userList");
        let allUsers = []; // Global variable to store the original data

        // 2. Fetch data once on page load
        fetch('https://jsonplaceholder.typicode.com/users')
            .then(response => response.json())
            .then(data => {
                allUsers = data; // Save the full list
                displayUsers(allUsers); // Initial display
            });

        // 3. Function to render the list to the DOM
        function displayUsers(users) {
            userList.innerHTML = users.map(user => `<li>${user.name}</li>`).join('');
            if (users.length === 0) {
                userList.innerHTML = "<li>No users found</li>";
            }
        }

        // 4. Filter logic triggered by the input event
        searchInput.addEventListener("input", (e) => {
            const searchTerm = e.target.value.toLowerCase();

            // Use .filter() to find matching names
            const filteredUsers = allUsers.filter(user =>
                user.name.toLowerCase().includes(searchTerm)
            );

            // Re-render only the matching users
            displayUsers(filteredUsers);
        });
    </script>

</body>
</html>
