<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Gallery Lab</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        #gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        .photo-item {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 170px;
        }
        img {
            width: 150px;
            height: 150px;
            border-radius: 5px;
            display: block;
        }
        p {
            font-size: 0.8rem;
            color: #333;
            margin-top: 10px;
            text-transform: capitalize;
        }
    </style>
</head>
<body>

    <h1>Photo Gallery</h1>
    <div id="gallery">
        </div>

    <script>
        const gallery = document.getElementById("gallery");

        // 1. Fetch the data with a limit of 5 photos
        fetch('https://jsonplaceholder.typicode.com/photos?_limit=5')
            .then(response => response.json())
            .then(photos => {
                // 2. Loop through each photo object
                photos.forEach(photo => {
                    // 3. Create a container for the image and title
                    const div = document.createElement("div");
                    div.className = "photo-item";

                    // 4. Set the innerHTML with the img and title
                    div.innerHTML = `
                        <img src="${photo.thumbnailUrl}" alt="${photo.title}">
                        <p>${photo.title.slice(0, 20)}...</p>
                    `;

                    gallery.appendChild(div);
                });
            })
            .catch(err => console.error("Error fetching photos:", err));
    </script>

</body>
</html>
