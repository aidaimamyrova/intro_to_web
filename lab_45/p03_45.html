<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Random Joke Generator</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 50px; background-color: #f9f9f9; }
        .joke-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
        }
        #setup { font-style: italic; color: #555; font-size: 1.2rem; }
        #punchline { font-weight: bold; color: #d32f2f; font-size: 1.4rem; margin-top: 10px; }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 20px;
        }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>

    <div class="joke-container">
        <h1>😂 Joke Generator</h1>
        <p id="setup">Click the button to hear a joke!</p>
        <p id="punchline"></p>
        <button id="jokeBtn">Get Joke</button>
    </div>

    <script>
        const setupText = document.getElementById("setup");
        const punchlineText = document.getElementById("punchline");
        const jokeBtn = document.getElementById("jokeBtn");

        // 1. Function to fetch a new joke
        function getJoke() {
            // Show a loading state
            setupText.innerText = "Fetching joke...";
            punchlineText.innerText = "";

            fetch('https://official-joke-api.appspot.com/random_joke')
                .then(response => response.json())
                .then(joke => {
                    // 2. Display the setup and punchline from the JSON object
                    setupText.innerText = joke.setup;
                    punchlineText.innerText = joke.punchline;
                })
                .catch(error => {
                    setupText.innerText = "Oops! Something went wrong.";
                    console.error('Error:', error);
                });
        }

        // 3. Attach the function to the button click
        jokeBtn.onclick = getJoke;
    </script>

</body>
</html>
