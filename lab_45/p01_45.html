<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fetch User Data Lab</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #userList { list-style: none; padding: 0; }
        li {
            background: #f4f4f4;
            margin: 10px 0;
            padding: 10px;
            border-left: 5px solid #007bff;
        }
        strong { color: #007bff; }
    </style>
</head>
<body>

    <h1>User Directory</h1>
    <ul id="userList">
        </ul>

    <script>
        const userList = document.getElementById("userList");

        // 1. Use fetch() to get data from the API
        fetch('https://jsonplaceholder.typicode.com/users')
            // 2. Convert the raw response into JSON format
            .then(response => response.json())
            .then(data => {
                // 3. Loop through the array of user objects
                data.forEach(user => {
                    // 4. Create a list item for each user
                    const li = document.createElement("li");
                    li.innerHTML = `<strong>${user.name}</strong> - ${user.email}`;

                    // Append to the UL
                    userList.appendChild(li);
                });
            })
            // Handle any errors (like no internet or broken link)
            .catch(error => {
                console.error('Error fetching data:', error);
                userList.innerHTML = "<li>Failed to load users.</li>";
            });
    </script>

</body>
</html>
