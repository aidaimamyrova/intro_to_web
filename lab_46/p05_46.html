<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Animated Gallery Experience</title>
    <style>
        /* --- Gallery Hover Effects --- */
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .gallery img {
            width: 100%; border-radius: 8px; cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .gallery img:hover { transform: scale(1.08) rotate(2deg); z-index: 2; }

        /* --- 1. Smooth Modal Fade --- */
        #imageModal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.5s ease;
        }
        #imageModal.show { display: flex; opacity: 1; }

        /* --- 2. Image Zoom & Fade Effect --- */
        .modal-content {
            max-width: 80%; max-height: 80%;
            transform: scale(0.7); /* Starts smaller */
            transition: transform 0.4s ease, opacity 0.4s ease;
            opacity: 0;
        }
        #imageModal.show .modal-content {
            transform: scale(1); /* Zooms to full size */
            opacity: 1;
        }

        /* Helper class for switching images */
        .fade-out { opacity: 0; transform: scale(0.9); }

        .nav-btn { background: none; color: white; border: none; font-size: 3rem; cursor: pointer; padding: 20px; }
    </style>
</head>
<body>

    <div class="gallery" id="gallery"></div>

    <div id="imageModal">
        <button class="nav-btn" onclick="changeImage(-1)">&#10094;</button>
        <img class="modal-content" id="fullImage">
        <button class="nav-btn" onclick="changeImage(1)">&#10095;</button>
    </div>

        const gallery = document.getElementById("gallery");
        images.forEach((src, i) => {
            const img = document.createElement("img");
            img.src = src;
            img.onclick = () => openModal(i);
            gallery.appendChild(img);
        });

            currentIndex = index;
            fullImg.src = images[currentIndex];
            modal.style.display = "flex";
            // Use setTimeout to allow 'display: flex' to register before adding opacity
            setTimeout(() => modal.classList.add("show"), 10);
        }
