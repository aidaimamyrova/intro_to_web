<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic Image Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            padding: 20px;
        }

        /* 2. Style the gallery using CSS Grid */
        .gallery-container {
            display: grid;
            /* Creates 3 columns that adjust automatically */
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1000px;
        }

        .gallery-item {
            overflow: hidden; /* Keeps the scaled image inside the borders */
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background-color: #fff;
        }

        img {
            width: 100%;
            height: 200px;
            object-fit: cover; /* Ensures images don't look stretched */
            display: block;
            transition: transform 0.3s ease; /* Smooth transition for the hover */
        }

        /* 3. Add a hover effect that scales the images */
        img:hover {
            transform: scale(1.1); /* Zooms in by 10% */
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>My Travel Gallery</h1>

    <div class="gallery-container">
        <div class="gallery-item">
            <img src="https://picsum.photos/id/10/400/300" alt="Mountain">
        </div>
        <div class="gallery-item">
            <img src="https://picsum.photos/id/20/400/300" alt="Field">
        </div>
        <div class="gallery-item">
            <img src="https://picsum.photos/id/30/400/300" alt="Mug">
        </div>
        <div class="gallery-item">
            <img src="https://picsum.photos/id/40/400/300" alt="Forest">
        </div>
        <div class="gallery-item">
            <img src="https://picsum.photos/id/50/400/300" alt="Lake">
        </div>
        <div class="gallery-item">
            <img src="https://picsum.photos/id/60/400/300" alt="Desktop">
        </div>
    </div>

</body>
</html>
