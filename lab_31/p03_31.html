<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Alignment</title>
    <style>
        .container {
            display: grid;
            /* Creates 3 columns, each 150px wide */
            grid-template-columns: repeat(3, 150px);
            grid-template-rows: 150px;
            /* justify-items centers items horizontally within the cell */
            justify-items: center;
            /* align-items centers items vertically within the cell */
            align-items: center;
            border: 2px solid black;
        }

        .box {
            width: 50px;
            height: 50px;
            background-color: coral;
            text-align: center;
            line-height: 50px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">A</div>
        <div class="box">B</div>
        <div class="box">C</div>
    </div>

</body>
</html>
